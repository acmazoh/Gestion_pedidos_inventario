{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Eliminar Producto</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'ventas/restin-theme.css' %}">
</head>
<body>
    <div class="page-shell">
        <div class="page-container">
            <section class="page-card stack">
                <h1 class="page-title">Eliminar producto</h1>
                <div class="alert alert-error">¿Estás seguro de que quieres eliminar "{{ object.nombre }}"?</div>
                <form method="post" class="actions-row">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Eliminar</button>
                    <a href="{% url 'producto_list' %}" class="btn btn-ghost">Cancelar</a>
                </form>
            </section>
        </div>
    </div>
</body>
</html>
