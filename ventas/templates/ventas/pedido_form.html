<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Nuevo Pedido</title>
</head>
<body>
    <h1>Crear Nuevo Pedido</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Crear Pedido</button>
    </form>
    <div>
        <a href="{% url 'pedido_list' %}">Ver Pedidos</a> |
        <a href="{% url 'venta_list' %}">Volver a Productos</a>
    </div>
</body>
</html>
