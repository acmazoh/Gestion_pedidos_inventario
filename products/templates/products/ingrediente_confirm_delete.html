<!DOCTYPE html>
<html>
<head>
    <title>Eliminar Ingrediente</title>
</head>
<body>
    <h1>Eliminar Ingrediente</h1>
    <p>¿Estás seguro de que deseas eliminar <strong>{{ object.nombre }}</strong>?</p>
    <p>Stock actual: {{ object.stock }}</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Sí, eliminar</button>
    </form>
    <a href="{% url 'ingrediente_list' %}">Cancelar</a>
</body>
</html>
