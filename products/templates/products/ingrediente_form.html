<!DOCTYPE html>
<html>
<head>
    <title>{% if form.instance.pk %}Editar{% else %}Agregar{% endif %} Ingrediente</title>
</head>
<body>
    <h1>{% if form.instance.pk %}Editar Ingrediente{% else %}Agregar Ingrediente{% endif %}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Guardar</button>
    </form>
    <a href="{% url 'ingrediente_list' %}">Volver</a>
</body>
</html>
