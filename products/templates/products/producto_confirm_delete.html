{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar producto</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'ventas/restin-theme.css' %}">
</head>
<body>
<div class="page-shell">
  <div class="page-container">
    <section class="page-card stack">
      <h1 class="page-title">Eliminar producto</h1>
      <div class="alert alert-error">
        ¿Estás seguro de que deseas eliminar <strong>{{ object.nombre }}</strong>?
        Esta acción no se puede deshacer.
      </div>
      <div style="font-size:.9rem;color:#374151">
        <p><strong>Categoría:</strong> {{ object.categoria }}</p>
        <p><strong>Precio:</strong> ${{ object.precio }}</p>
      </div>
      <form method="post" class="actions-row">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        <a href="{% url 'producto_list' %}" class="btn btn-ghost">Cancelar</a>
      </form>
    </section>
  </div>
</div>
</body>
</html>
