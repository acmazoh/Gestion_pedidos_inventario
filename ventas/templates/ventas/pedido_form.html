<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Nuevo Pedido</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 0 16px; }
        nav { margin-bottom: 16px; }
        .msg-success { background:#d4edda; border:1px solid #28a745; padding:8px 12px; border-radius:4px; margin-bottom:12px; }
        .msg-error   { background:#ffe6e6; border:1px solid #cc0000; padding:8px 12px; border-radius:4px; margin-bottom:12px; }
        .logout-btn { float:right; }
        input[type="text"], select { width:100%; padding:6px; box-sizing:border-box; border:1px solid #ccc; border-radius:4px; }
        button[type="submit"] { margin-top:12px; padding:8px 20px; background:#1a73e8; color:#fff; border:none; border-radius:4px; cursor:pointer; }
        button[type="submit"]:hover { background:#1558b0; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'pedido_list' %}">Ver Pedidos</a> |
        <a href="{% url 'venta_list' %}">Productos</a>
        <form method="post" action="{% url 'logout' %}" style="display:inline;" class="logout-btn">
            {% csrf_token %}
            <button type="submit" style="background:none;border:none;color:#c00;cursor:pointer;padding:0;">Cerrar Sesión ({{ request.user.username }})</button>
        </form>
    </nav>

    <h1>Crear Nueva Orden</h1>

    {% for message in messages %}
    <div class="{% if message.tags == 'error' %}msg-error{% else %}msg-success{% endif %}">{{ message }}</div>
    {% endfor %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Crear Orden</button>
    </form>
</body>
</html>
