<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión - Restin POS</title>
</head>
<body>
    <h1>Restin POS — Iniciar sesión</h1>

    {% if form.errors %}
    <div style="border:1px solid red; padding:10px; margin:10px 0; background:#ffe6e6;">
        <strong>Usuario o contraseña incorrectos.</strong> Por favor verifica tus datos e intenta de nuevo.
    </div>
    {% endif %}

    {% if messages %}
    <div style="border:1px solid orange; padding:10px; margin:10px 0; background:#fff3cd;">
        {% for message in messages %}
        <p>{{ message }}</p>
        {% endfor %}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <p>
            <label for="id_username">Usuario:</label><br>
            <input type="text" name="username" id="id_username" required autofocus>
        </p>
        <p>
            <label for="id_password">Contraseña:</label><br>
            <input type="password" name="password" id="id_password" required>
        </p>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit">Ingresar</button>
    </form>
</body>
</html>
