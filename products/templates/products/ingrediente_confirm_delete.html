{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Eliminar Ingrediente</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'ventas/restin-theme.css' %}?v=20260513">
</head>
<body>
    <div class="page-shell">
        <div class="page-container">
            <nav class="top-nav">
                <div class="brand"><img class="brand-logo" src="{% static 'ventas/restin2.jpeg' %}?v=20260513" alt="Logo"> Restin <span>Ingredientes</span></div>
                <div class="nav-links">
                    <a class="nav-link is-active" href="{% url 'ingrediente_list' %}">Ingredientes</a>
                    <a class="nav-link" href="{% url 'movimiento_list' %}">Movimientos</a>
                    <a class="nav-link" href="{% url 'producto_list' %}">Productos</a>
                </div>
                <div class="nav-end">
                    <a href="{% url 'pedido_create' %}" class="btn btn-ghost">&larr; Nuevo Pedido</a>
                </div>
            </nav>

            <section class="page-card stack">
                <h1 class="page-title">Eliminar ingrediente</h1>
                <div class="alert alert-error">
                    ¿Estás seguro de que deseas eliminar <strong>{{ object.nombre }}</strong>?
                </div>
                <p><strong>Stock actual:</strong> {{ object.stock }}</p>
                <form method="post" class="actions-row">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                    <a href="{% url 'ingrediente_list' %}" class="btn btn-ghost">Cancelar</a>
                </form>
            </section>
        </div>
    </div>
</body>
</html>
